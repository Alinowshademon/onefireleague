<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Leaderboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0b1220;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:1100px;
    background:#1b2940;
    border-radius:20px;
    padding:25px;
    box-shadow:0 0 20px rgba(0,200,255,.25);
}

h1{
    text-align:center;
    color:#00cfff;
    font-size:42px;
    margin-bottom:10px;
    text-shadow:0 0 10px rgba(0,200,255,.5);
}

h2{
    text-align:center;
    color:#ffd33d;
    font-size:28px;
    margin-bottom:25px;
}

.leaderboard{
    background:#24354a;
    border:2px solid #00cfff;
    border-radius:15px;
    overflow:hidden;
}

.leaderboard iframe{
    width:100%;
    height:750px;
    border:none;
    background:#fff;
}

.back-section{
    text-align:center;
    margin-top:25px;
}

.back-btn{
    display:inline-block;
    background:#00cfff;
    color:#0b1220;
    text-decoration:none;
    padding:14px 35px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#00b4e6;
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(0,200,255,.5);
}

@media (max-width:768px){

    h1{
        font-size:30px;
    }

    h2{
        font-size:22px;
    }

    .leaderboard iframe{
        height:600px;
    }

    .back-btn{
        width:100%;
        padding:15px;
        font-size:17px;
    }

}
</style>

</head>
<body>

<div class="container">

    <h1>🏆 ∆NE FIRE LEAGUE</h1>
    <h2>Leaderboard</h2>

    <div class="leaderboard">
        <iframe
        src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRc9OITYBV8D8JZiroYqxKzuVvpxUCZzzO1qEnoO1mQ78lhvZScpcWVq8sRvkV-S0jafe-LkmbKikpu/pubhtml">
        </iframe>
    </div>

    <div class="back-section">
        <a href="dashboard.html" class="back-btn">⬅️ Back</a>
    </div>

</div>

</body>
</html>
