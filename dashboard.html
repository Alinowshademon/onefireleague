<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∆NE FIRE LEAGUE Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a1220;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:430px;
background:#1b2740;
border-radius:28px;
padding:35px 25px;
text-align:center;
box-shadow:0 0 25px rgba(0,195,255,.18);
}

h1{
color:#18cfff;
font-size:34px;
font-weight:bold;
margin-bottom:8px;
text-shadow:0 0 15px rgba(24,207,255,.7);
}

#welcome{
color:#ffd633;
font-size:24px;
margin-bottom:30px;
}

button{
width:100%;
margin:12px 0;
padding:18px;
border:none;
border-radius:15px;
background:#19c7f7;
color:#07111d;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.25s;
box-shadow:0 6px 18px rgba(0,200,255,.35);
}

button:hover{
background:#32d5ff;
transform:translateY(-3px);
box-shadow:0 0 20px #19c7f7;
}

button:active{
transform:scale(.97);
}

.footer{
margin-top:25px;
color:#b8c7d6;
font-size:14px;
}

@media(max-width:480px){

.container{
padding:30px 20px;
}

h1{
font-size:28px;
}

#welcome{
font-size:22px;
}

button{
font-size:17px;
padding:16px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🏆 ∆NE FIRE LEAGUE 🏆</h1>

<h2 id="welcome">Welcome Player</h2>

<button onclick="location.href='profile.html'">
👤 My Profile
</button>

<button onclick="location.href='tournament.html'">
📝 Tournament Registration
</button>

<button onclick="location.href='leaderboard.html'">
🏆 Leaderboard
</button>

<button onclick="location.href='matchtime.html'">
📅 Match Times
</button>

<button onclick="location.href='mainpage.html'">
📰 News Feed
</button>

<button onclick="logout()">
🚪 Logout
</button>

<div class="footer">
© 2026 ∆NE FIRE LEAGUE
</div>

</div>

<script type="module" src="dashboard.js"></script>

<script>
function logout(){
if(confirm("Are you sure you want to logout?")){
window.location.href="index.html";
}
}
</script>

</body>
</html>
