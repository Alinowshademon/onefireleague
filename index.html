<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∆NE FIRE LEAGUE | Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a1220;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:430px;
background:#1b2740;
border-radius:28px;
padding:35px 25px;
text-align:center;
box-shadow:0 0 25px rgba(0,195,255,.18);
}

h1{
font-size:34px;
color:#18cfff;
margin-bottom:10px;
text-shadow:0 0 15px rgba(24,207,255,.7);
}

h2{
font-size:24px;
color:#ffd633;
margin-bottom:30px;
}

input{
width:100%;
padding:16px;
margin:12px 0;
border:none;
border-radius:15px;
background:#24334d;
color:#ffffff;
font-size:17px;
outline:none;
transition:.25s;
}

input::placeholder{
color:#aab7c5;
}

input:focus{
box-shadow:0 0 12px #18cfff;
}

button{
width:100%;
padding:17px;
margin-top:15px;
border:none;
border-radius:15px;
background:#19c7f7;
color:#07111d;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.25s;
box-shadow:0 6px 18px rgba(0,200,255,.35);
}

button:hover{
background:#32d5ff;
transform:translateY(-3px);
box-shadow:0 0 20px #19c7f7;
}

button:active{
transform:scale(.97);
}

#errorMessage{
color:#ff5d5d;
margin-top:12px;
min-height:22px;
font-weight:bold;
}

p{
margin-top:22px;
margin-bottom:10px;
color:#c8d6e2;
}

.footer{
margin-top:22px;
font-size:14px;
color:#9db2c6;
}

@media(max-width:480px){

.container{
padding:30px 20px;
}

h1{
font-size:29px;
}

h2{
font-size:22px;
}

input{
font-size:16px;
padding:15px;
}

button{
font-size:17px;
padding:16px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🏆 ∆NE FIRE LEAGUE 🏆</h1>

<h2>Player Login</h2>

<input
type="email"
id="email"
placeholder="📧 Email">

<input
type="password"
id="password"
placeholder="🔒 Password">

<button id="loginBtn">
🚀 Login
</button>

<p id="errorMessage"></p>

<p>Don't have an account?</p>

<button onclick="location.href='signup.html'">
📝 Create Account
</button>

<div class="footer">
© 2026 ∆NE FIRE LEAGUE
</div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
