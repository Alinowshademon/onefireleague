<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>👑 Tournament Manager</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:#07111d;

padding:20px;

color:white;

}

.container{

max-width:900px;

margin:auto;

}

h1{

text-align:center;

color:#19c7f7;

margin-bottom:25px;

text-shadow:0 0 12px #19c7f7;

}

.card{

background:#1b2740;

border:2px solid #19c7f7;

border-radius:20px;

padding:20px;

margin-bottom:25px;

box-shadow:0 0 15px rgba(0,200,255,.15);

}

.card h2{

color:#ffd633;

margin-bottom:20px;

}

label{

display:block;

margin-top:18px;

margin-bottom:8px;

font-weight:bold;

color:#18cfff;

}

input,select{

width:100%;

padding:14px;

border:none;

border-radius:12px;

background:#24334d;

color:white;

font-size:16px;

outline:none;

}

input:focus,

select:focus{

box-shadow:0 0 10px #19c7f7;

}

.checkbox{

display:flex;

align-items:center;

gap:12px;

margin-top:20px;

}

.checkbox input{

width:auto;

transform:scale(1.2);

}

.actions{

display:flex;

gap:12px;

margin-top:25px;

flex-wrap:wrap;

}

.actions button{

flex:1;

padding:15px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.25s;

}
.save{

background:#28c76f;

color:white;

}

.new{

background:#19c7f7;

color:#07111d;

}

.delete{

background:#ea5455;

color:white;

}

.back{

background:#ffd633;

color:#07111d;

}

.actions button:hover{

transform:translateY(-2px);

opacity:.95;

}

.list{

display:flex;

flex-direction:column;

gap:15px;

}

.tournament-item{

background:#24334d;

border:2px solid #19c7f7;

border-radius:15px;

padding:18px;

cursor:pointer;

transition:.25s;

}

.tournament-item:hover{

box-shadow:0 0 12px #19c7f7;

transform:translateY(-2px);

}

.active-badge{

color:#28c76f;

font-weight:bold;

margin-top:8px;

}

</style>

</head>

<body>

<div class="container">

<h1>👑 Tournament Manager</h1>

<div class="card">

<h2>Create / Edit Tournament</h2>

<label>

Tournament Name

</label>

<input

id="name"

placeholder=" Duo clash / Bl∆∆d thirst ">

<label>

Game Mode

</label>

<select id="mode">

<option>Solo</option>

<option>Duo</option>

<option>Squad</option>

</select>

<label>

Map

</label>

<select id="map">

<option>Bermuda</option>

<option>Purgatory</option>

<option>Kalahari</option>

<option>Alpine</option>

<option>Nexterra</option>

<option>Solara</option>

</select>
<label>

Tournament Date

</label>

<input
type="date"
id="date">

<label>

Tournament Time

</label>

<input
type="time"
id="time">

<label>

Entry Fee (৳)

</label>

<input
type="number"
id="fee"
placeholder="15">

<label>

Payment Number

</label>

<input
id="payment"
placeholder="01973391882">

<div class="checkbox">

<input
type="checkbox"
id="registrationOpen">

<label for="registrationOpen">

Registration Open

</label>

</div>

<div class="checkbox">

<input
type="checkbox"
id="activeTournament">

<label for="activeTournament">

Set as Active Tournament

</label>

</div>

<div class="actions">

<button
class="new"
id="newBtn">

➕ New Tournament

</button>

<button
class="save"
id="saveBtn">

💾 Save Tournament

</button>

<button
class="delete"
id="deleteBtn">

🗑 Delete Tournament

</button>

</div>

</div>
<div class="card">

<h2>📋 Existing Tournaments</h2>

<div id="tournamentList" class="list">

<div class="tournament-item">

<h3>No tournaments found.</h3>

<p>Create your first tournament using the form above.</p>

</div>

</div>

</div>

<button
class="back"
onclick="location.href='admin.html'">

⬅ Back to Admin Panel

</button>

</div>

<script
type="module"
src="tournament-manager.js">

</script>

</body>

</html>
