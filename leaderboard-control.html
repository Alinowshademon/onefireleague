<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>∆NE FIRE LEAGUE | Leaderboard Control</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b1220;
color:#fff;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:#1b2940;
padding:25px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,200,255,.25);
}

h1{
text-align:center;
color:#00cfff;
font-size:38px;
margin-bottom:10px;
}

h2{
text-align:center;
color:#ffd33d;
margin-bottom:30px;
}

.form{
display:grid;
grid-template-columns:2fr 1fr auto;
gap:15px;
margin-bottom:25px;
}

input{
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
outline:none;
}

button{
padding:14px 22px;
border:none;
border-radius:10px;
background:#00cfff;
color:#0b1220;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#00b4e6;
}

table{
width:100%;
border-collapse:collapse;
background:#24354a;
overflow:hidden;
border-radius:12px;
}

th{
background:#00cfff;
color:#0b1220;
padding:14px;
}

td{
padding:14px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.08);
}

.editBtn{
background:#ffd33d;
margin-right:8px;
}

.deleteBtn{
background:#ff4d4d;
color:#fff;
}

.back{
margin-top:25px;
text-align:center;
}

.back a{
display:inline-block;
padding:14px 35px;
background:#00cfff;
color:#0b1220;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

@media(max-width:768px){

.form{
grid-template-columns:1fr;
}

table{
font-size:14px;
}

td,th{
padding:10px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>🏆 ∆NE FIRE LEAGUE</h1>
<h2>Leaderboard Control</h2>

<div class="form">

<input
type="text"
id="playerName"
placeholder="Player Name">

<input
type="number"
id="playerPoints"
placeholder="Points">

<button id="saveBtn">
➕ Add Player
</button>

</div>

<table>

<thead>

<tr>
<th>Rank</th>
<th>Player</th>
<th>Points</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="leaderboardTable">

<tr>
<td colspan="4">
Loading...
</td>
</tr>

</tbody>

</table>

<div class="back">
<a href="admin.html">⬅ Back to Admin Panel</a>
</div>

</div>

<script type="module" src="leaderboard-control.js"></script>

</body>
</html>
