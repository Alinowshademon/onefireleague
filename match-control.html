<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 Match Control | ∆NE FIRE LEAGUE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#07111d;
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
}

.container{
width:100%;
max-width:500px;
background:#1b2740;
border-radius:28px;
padding:30px 25px;
box-shadow:0 0 25px rgba(0,195,255,.25);
}

h1{
text-align:center;
color:#19c7f7;
font-size:30px;
margin-bottom:8px;
text-shadow:0 0 15px rgba(0,195,255,.7);
}

h2{
text-align:center;
color:#ffd633;
font-size:20px;
margin-bottom:25px;
}


.box{

background:#24334d;

border:2px solid #19c7f7;

border-radius:18px;

padding:20px;

margin-bottom:20px;

}


.box h3{

text-align:center;

color:#19c7f7;

margin-bottom:15px;

}


input{

width:100%;

padding:14px;

margin:8px 0;

border-radius:12px;

border:none;

background:#07111d;

color:white;

font-size:16px;

}


button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:#19c7f7;

color:#07111d;

font-size:17px;

font-weight:bold;

cursor:pointer;

margin-top:10px;

}


button:hover{

background:#32d5ff;

}


.back{

display:block;

text-align:center;

margin-top:15px;

color:#19c7f7;

text-decoration:none;

}

</style>

</head>


<body>


<div class="container">


<h1>👑 ∆NE FIRE LEAGUE</h1>

<h2>🎮 Match Control</h2>



<div class="box">


<h3>🏆 Duo Clash Tournament</h3>


<input id="duoDate" placeholder="Date">

<input id="duoTime" placeholder="Time">

<input id="duoMap" placeholder="Map">

<input id="duoRoom" placeholder="Room ID">

<input id="duoPass" placeholder="Password">


<button onclick="updateDuo()">
UPDATE MATCH TIME
</button>


</div>




<div class="box">


<h3>🏆 Duo Clash Tournament</h3>


<input id="weeklyDate" placeholder="Date">

<input id="weeklyTime" placeholder="Time">

<input id="weeklyMap" placeholder="Map">

<input id="weeklyRoom" placeholder="Room ID">

<input id="weeklyPass" placeholder="Password">


<button onclick="updateWeekly()">
UPDATE MATCH TIME
</button>


</div>



<a class="back" href="admin.html">
⬅️ Back to Admin Panel
</a>



</div>


<script type="module" src="match-control.js"></script>


</body>

</html>
