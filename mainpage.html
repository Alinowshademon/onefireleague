<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∆NE FIRE LEAGUE | News Feed</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a1220;
color:#fff;
min-height:100vh;
}

header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#1b2740;
box-shadow:0 0 20px rgba(0,195,255,.18);
z-index:100;
}

header h2{
color:#18cfff;
font-size:30px;
text-shadow:0 0 15px rgba(24,207,255,.7);
}

#menuBtn{
background:#19c7f7;
color:#07111d;
border:none;
padding:12px 18px;
border-radius:12px;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:.25s;
box-shadow:0 5px 15px rgba(0,200,255,.35);
}

#menuBtn:hover{
background:#32d5ff;
transform:scale(1.05);
box-shadow:0 0 20px #19c7f7;
}

#feed{
width:95%;
max-width:900px;
margin:30px auto;
}

.news-card{
background:#1b2740;
border-radius:25px;
padding:25px;
margin-bottom:30px;
box-shadow:0 0 25px rgba(0,195,255,.18);
}

.news-card h1{
text-align:center;
color:#18cfff;
font-size:34px;
margin-bottom:10px;
text-shadow:0 0 15px rgba(24,207,255,.7);
}

.news-card h3{
color:#ffd633;
margin:20px 0 15px;
font-size:22px;
}

.video-box{
border:2px solid #19c7f7;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 18px rgba(0,200,255,.25);
}

.video-box iframe{
display:block;
width:100%;
height:450px;
border:none;
}

.back-btn{
display:block;
width:100%;
padding:17px;
margin-top:20px;
text-align:center;
text-decoration:none;
background:#19c7f7;
color:#07111d;
font-size:18px;
font-weight:bold;
border-radius:15px;
transition:.25s;
box-shadow:0 6px 18px rgba(0,200,255,.35);
}

.back-btn:hover{
background:#32d5ff;
transform:translateY(-3px);
box-shadow:0 0 20px #19c7f7;
}

footer{
text-align:center;
padding:25px;
color:#9fb1c3;
font-size:14px;
}

@media(max-width:768px){

header h2{
font-size:24px;
}

.news-card{
padding:20px;
}

.news-card h1{
font-size:28px;
}

.news-card h3{
font-size:20px;
}

.video-box iframe{
height:230px;
}

}

</style>

</head>

<body>

<header>

<h2>📰 News Feed</h2>

<button id="menuBtn">☰</button>

</header>

<div id="feed">

<div class="news-card">

<h1>🔥 Latest Videos</h1>

<h3>1. Rick and Roll</h3>

<div class="video-box">

<iframe
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
title="Rick and Roll"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

</div>

<h3>2. Warm Up Match</h3>

<div class="video-box">

<iframe
src="https://www.youtube.com/embed/glrFcrvxjsQ"
title="Warm Up Match"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

</div>

<a href="dashboard.html" class="back-btn">
⬅ Back to Dashboard
</a>

</div>

</div>

<footer>
© 2026 ∆NE FIRE LEAGUE
</footer>

<script src="mainpage.js"></script>

</body>
</html>
